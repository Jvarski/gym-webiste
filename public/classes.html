<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classes - PowerFit Gym</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="logo"><a href="index.html" class="logo-link">PowerFit Gym</a></div>
  <nav>
    <a href="index.html">Home</a>
    <a href="classes.html">Classes</a>
    <a href="trainers.html">Trainers</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
<a href="dashboard.html">My Bookings</a>
    <span id="authLinks">
  <a href="login.html">Login</a>
  <a href="signup.html">Sign Up</a>
</span>
  </nav>
</header>

<section class="page-header">
  <h1>Our Classes</h1>
  <p>Find the perfect class to match your fitness goals.</p>
</section>

<section class="classes-grid" id="classesGrid"></section>

<script>
async function loadClasses() {
  const res = await fetch('/api/classes');
  const classes = await res.json();
  const grid = document.getElementById('classesGrid');
  classes.forEach(c => {
    const div = document.createElement('div');
    div.className = 'class-card';
  div.innerHTML = `<h3>${c.name}</h3><p>${c.schedule}</p><p>${c.description}</p><button class="btn book-btn" onclick="bookClass(${c.id})">Book This Class</button>`;
    grid.appendChild(div);
  });
}

async function bookClass(classId) {
  const res = await fetch('/api/bookings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({ classId })
  });
  const data = await res.json();

  if (data.success) {
    alert('Class booked successfully!');
  } else if (res.status === 401) {
    alert('Please log in first to book a class.');
    window.location.href = 'login.html';
  } else {
    alert(data.error || 'Something went wrong.');
  }
}

loadClasses();
</script>

<footer>
  <p>&copy; 2026 PowerFit Gym. All rights reserved.</p>
</footer>

<script>
async function checkAuth() {
  const res = await fetch('/api/me', { credentials: 'include' });
  const data = await res.json();
  const authLinks = document.getElementById('authLinks');

  if (data.loggedIn) {
    authLinks.innerHTML = `
      <span class="welcome-text">Welcome, ${data.name}</span>
      <a href="#" onclick="logout()">Logout</a>
    `;
  }
}

async function logout() {
  await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  window.location.href = 'index.html';
}

checkAuth();
</script>

</body>
</html>
