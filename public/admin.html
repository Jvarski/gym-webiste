<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Registered Users</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo"><a href="index.html" class="logo-link">PowerFit Gym</a></div>
</header>

<section class="page-header">
  <h1>Registered Users</h1>
  <p>Admin view</p>
</section>

<section style="padding: 40px; display: flex; justify-content: center;">
  <div id="loginBox" style="max-width: 350px; width: 100%;">
    <label style="font-weight: bold;">Admin Password</label>
    <input type="password" id="adminKey" style="width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px;">
    <button class="btn" style="margin-top: 15px; border: none; cursor: pointer;" onclick="loadUsers()">View Users</button>
    <p id="errorMsg" style="color: red; margin-top: 10px;"></p>
  </div>
</section>

<section style="padding: 0 40px 40px;">
  <table id="usersTable" style="width: 100%; max-width: 700px; margin: 0 auto; border-collapse: collapse; display: none;">
    <thead>
      <tr>
        <th style="text-align:left; padding: 10px; border-bottom: 2px solid #ff4c29;">ID</th>
        <th style="text-align:left; padding: 10px; border-bottom: 2px solid #ff4c29;">Name</th>
        <th style="text-align:left; padding: 10px; border-bottom: 2px solid #ff4c29;">Email</th>
      </tr>
    </thead>
    <tbody id="usersBody"></tbody>
  </table>
</section>

<footer>
  <p>&copy; 2026 PowerFit Gym. All rights reserved.</p>
</footer>

<script>
async function loadUsers() {
  const key = document.getElementById('adminKey').value;
  const res = await fetch(`/api/admin/users?key=${encodeURIComponent(key)}`);
  const data = await res.json();

  if (res.status === 403) {
    document.getElementById('errorMsg').textContent = 'Incorrect password.';
    return;
  }

  document.getElementById('errorMsg').textContent = '';
  const table = document.getElementById('usersTable');
  const body = document.getElementById('usersBody');
  body.innerHTML = '';

  data.forEach(u => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="padding: 10px; border-bottom: 1px solid #eee;">${u.id}</td>
      <td style="padding: 10px; border-bottom: 1px solid #eee;">${u.name}</td>
      <td style="padding: 10px; border-bottom: 1px solid #eee;">${u.email}</td>
    `;
    body.appendChild(tr);
  });

  table.style.display = 'table';
}
</script>

</body>
</html>
